    <h2>Calculus</h2>

    <p>
    Calculus is a powerful mathematical tool developed by Isaac Newton to describe motion and change in mechanics.
    </p>

    \[
    \int dA = dx \times y
    \]

    \[
    A = f(x)\,dx
    \]

    \[
    \frac{dy}{dx}
    \]

    <p>
    which represents the slope or the rate of change of \(y\) with respect to \(x\).
    </p>
